<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechJobs | Secure File Upload</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .upload-card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid var(--border);
        }

        h2 { 
            margin-top: 0; 
            font-weight: 700;
            color: #0f172a;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        .file-input-wrapper {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #f1f5f9;
            cursor: pointer;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .progress-container {
            margin-top: 2rem;
            display: none;
        }

        .progress-bar {
            background: #e2e8f0;
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .progress-fill {
            background: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #status {
            font-size: 0.9rem;
            margin-top: 12px;
            color: #475569;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="upload-card">
    <h2>Upload File</h2>
    <p class="subtitle">Multipart Chunk Upload (5MB Chunks)</p>
    
    <div class="file-input-wrapper">
        <input type="file" id="fileInput">
    </div>

    <button onclick="startUpload()" id="uploadBtn">Upload to Server</button>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div id="status">Preparing stream...</div>
    </div>
</div>

<script>
/**
 * CRITICAL: For this fetch to succeed, your Go backend MUST send the header:
 * Access-Control-Allow-Origin: *
 */

async function startUpload() {
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];
    
    if (!file) {
        alert("Please select a file first");
        return;
    }

    const btn = document.getElementById('uploadBtn');
    const container = document.getElementById('progressContainer');
    const fill = document.getElementById('progressFill');
    const status = document.getElementById('status');

    // UI Reset
    btn.disabled = true;
    btn.innerText = "Processing...";
    container.style.display = 'block';
    fill.style.width = '0%';
    status.style.color = "#475569";

    const chunkSize = 5 * 1024 * 1024; // 5MB
    const totalChunks = Math.ceil(file.size / chunkSize);

    try {
        for (let i = 0; i < totalChunks; i++) {
            const start = i * chunkSize;
            const end = Math.min(file.size, start + chunkSize);
            const chunk = file.slice(start, end);

            const formData = new FormData();
            formData.append("chunk", chunk);
            formData.append("chunkIndex", i);
            formData.append("totalChunks", totalChunks);
            formData.append("filename", file.name);

            // Fetch to your local Go backend
            const response = await fetch("http://localhost:8080/uploadchunk", {
                method: "POST",
                body: formData,
                // Setting mode to 'cors' specifically, though it is the default
                mode: 'cors', 
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || `Server Error: ${response.status}`);
            }

            // Update Progress
            const percent = Math.round(((i + 1) / totalChunks) * 100);
            fill.style.width = percent + '%';
            status.innerText = `Uploading: ${percent}% (Chunk ${i + 1}/${totalChunks})`;
        }

        status.innerText = "✓ Upload Complete!";
        status.style.color = "#16a34a";
        btn.innerText = "Upload Another File";
        
    } catch (error) {
        // This is where your CORS "NetworkError" is currently being caught
        status.innerText = "Upload failed: " + error.message;
        status.style.color = "#dc2626";
        btn.innerText = "Retry Upload";
        console.error("Fetch error details:", error);
    } finally {
        btn.disabled = false;
    }
}
</script>

</body>
</html>
